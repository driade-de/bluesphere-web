<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSphere | Cámara de Conciencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --space-dark: #050a14; }
        body { 
            margin: 0; background: radial-gradient(circle at center, #0a192f 0%, var(--space-dark) 100%); 
            color: white; font-family: 'Montserrat', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }
        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--neon-cyan); 
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); margin-top: 40px; letter-spacing: 5px;
        }
        .oracle-center { 
            position: relative; width: 360px; height: 360px; margin: 30px auto; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 50%; 
            background: rgba(0, 242, 255, 0.02); box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.1);
        }
        .stability-percentage { font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 700; line-height: 1; }
        #countdown-timer { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon-cyan); margin-top: 10px; }
        .label-tag { font-size: 0.65rem; color: var(--neon-cyan); letter-spacing: 3px; opacity: 0.8; margin-bottom: 5px; font-weight: bold; }
        
        .sensor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; max-width: 1000px; margin-top: 20px; }
        .sensor-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); text-align: center;
        }
        .sensor-card h3 { font-size: 0.85rem; letter-spacing: 2px; margin: 10px 0; opacity: 0.7; }
        .sensor-card p { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; margin: 0; font-weight: bold; }
    </style>
</head>
<body>
    <h1 class="main-title">SISTEMA NERVIOSO PLANETARIO</h1>
    <div class="oracle-center">
        <span class="label-tag">ESTABILIDAD</span>
        <span class="stability-percentage" id="main-stability">--%</span>
        <div id="countdown-timer">0000d 00h 00m</div>
        <span style="font-size: 0.55rem; opacity: 0.5; letter-spacing: 2px; margin-top: 5px;">TIEMPO DE GRACIA RESTANTE</span>
    </div>
    <div class="sensor-grid">
        <div class="sensor-card"><span class="label-tag">ATMÓSFERA</span><h3>CO2</h3><p id="co2-val" style="color: var(--neon-cyan)">SINC...</p></div>
        <div class="sensor-card"><span class="label-tag">BIÓSFERA</span><h3>BIOMA</h3><p id="bioma-val" style="color: var(--neon-cyan)">SINC...</p></div>
        <div class="sensor-card"><span class="label-tag">CRIÓSFERA</span><h3>HIELO</h3><p id="hielo-val" style="color: var(--neon-cyan)">SINC...</p></div>
    </div>

    <script>
        // Reloj del Destino (Meta 2034)
        function updateClock() {
            const target = new Date("2034-12-31T00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("countdown-timer").innerText = `${d}d ${h}h ${m}m`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Conexión con el Pulso de Gaia (Supabase)
        const S_URL = 'https://ophicpcbgdgzthjamzoz.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waGljcGNiZ2RnenRoamFtem96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ3MjgwMzUsImV4cCI6MjA4MDMwNDAzNX0.K55Tk-cdbAFDOtGrIMN7vYFaJAccrsD6UdOrARt1P5c';

        async function syncGaia() {
            try {
                const res = await fetch(`${S_URL}/rest/v1/metricas_globales?select=*&order=created_at.desc&limit=1`, {
                    headers: { "apikey": S_KEY, "Authorization": `Bearer ${S_KEY}` }
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    const m = data[0];
                    document.getElementById("co2-val").innerText = `${m.co2_ppm} PPM`;
                    document.getElementById("bioma-val").innerText = `${m.salud_bioma}%`;
                    document.getElementById("hielo-val").innerText = `${m.masa_glaciar} GT`;
                    document.getElementById("main-stability").innerText = `${m.estabilidad_global}%`;
                }
            } catch (e) { console.error("Error de enlace Gaia:", e); }
        }
        setInterval(syncGaia, 10000);
        syncGaia();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSphere | Cámara de Conciencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --space-dark: #050a14; }
        body { margin: 0; background: radial-gradient(circle at center, #0a192f 0%, var(--space-dark) 100%); color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); margin-top: 50px; letter-spacing: 5px; text-align: center; }
        
        .oracle-center { position: relative; width: 380px; height: 380px; margin: 40px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 50%; background: rgba(0, 242, 255, 0.02); box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.1); }
        
        .stability-percentage { font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 700; color: white; line-height: 1; }
        
        #countdown-timer { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--neon-cyan); margin-top: 15px; letter-spacing: 2px; }
        .timer-label { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; margin-top: 30px; padding-bottom: 50px; }
        .sensor-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; }
    </style>
</head>
<body>
    <h1 class="main-title">SISTEMA NERVIOSO PLANETARIO</h1>
    
    <div class="oracle-center">
        <span style="font-size: 0.75rem; color: var(--neon-cyan); letter-spacing: 4px; font-weight: bold;">ESTABILIDAD</span>
        <span class="stability-percentage">--%</span>
        
        <div id="countdown-timer">0000d 00h 00m</div>
        <span class="timer-label">Tiempo de Gracia Restante</span>
    </div>

    <div class="sensor-grid">
        <div class="sensor-card"><h3>CO2</h3><p id="co2-val" style="color: var(--neon-cyan)">SINC...</p></div>
        <div class="sensor-card"><h3>BIOMA</h3><p id="bioma-val" style="color: var(--neon-cyan)">SINC...</p></div>
        <div class="sensor-card"><h3>HIELO</h3><p id="hielo-val" style="color: var(--neon-cyan)">SINC...</p></div>
    </div>

    <script>
        // 1. Lógica del Reloj
        function updateClock() {
            const targetDate = new Date("2034-12-31T00:00:00").getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("countdown-timer").innerHTML = `${days}d ${hours}h ${mins}m`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Integración Supabase
        const SUPABASE_URL = 'https://ophicpcbgdgzthjamzoz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waGljcGNiZ2RnenRoamFtem96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ3MjgwMzUsImV4cCI6MjA4MDMwNDAzNX0.K55Tk-cdbAFDOtGrIMN7vYFaJAccrsD6UdOrARt1P5c';

        async function conectarGaia() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/metricas_globales?select=*&order=created_at.desc&limit=1`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const metrica = data[0];
                    if(document.getElementById("co2-val")) document.getElementById("co2-val").innerText = `${metrica.co2_ppm} PPM`;
                    if(document.getElementById("bioma-val")) document.getElementById("bioma-val").innerText = `${metrica.salud_bioma}%`;
                    if(document.getElementById("hielo-val")) document.getElementById("hielo-val").innerText = `${metrica.masa_glaciar} GT`;
                    
                    const estabilidadTexto = document.querySelector(".stability-percentage");
                    if(estabilidadTexto) estabilidadTexto.innerText = `${metrica.estabilidad_global}%`;
                }
            } catch (error) {
                console.error("Falla en el enlace Gaia:", error);
            }
        }

        setInterval(conectarGaia, 10000);
        conectarGaia();
    </script>
</body>
</html>

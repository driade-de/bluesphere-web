<!DOCTYPE html>  
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado BlueSphere</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// ===== CONFIG SUPABASE (CORRECTA) =====
const supabaseUrl = "https://ophicpcbgdgzthjamzoz.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waGljcGNiZ2RnenRoamFtem96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ3MjgwMzUsImV4cCI6MjA4MDMwNDAzNX0.K55Tk-cdbAFDOtGrIMN7vYFaJAccrsD6UdOrARt1P5c";

const supabase = createClient(supabaseUrl, supabaseAnonKey);

document.addEventListener("DOMContentLoaded", async () => {

    // ===== LEER PARAMETROS =====
    const params = new URLSearchParams(window.location.search);
    const nombre = params.get("nombre");
    const codigo = params.get("codigo");

    // ===== ELEMENTOS =====
    const elNombre = document.getElementById("nombre");
    const elCodigo = document.getElementById("codigo");
    const elFecha = document.getElementById("fecha");
    const estado = document.getElementById("estado");

    // ===== FECHA =====
    const fecha = new Date().toLocaleDateString("es-MX", {
        day: "2-digit",
        month: "long",
        year: "numeric"
    });

    // ===== VALIDACIÓN PREVIA =====
    if (!codigo) {
        estado.innerHTML = "❌ Código no proporcionado";
        return;
    }

    // ===== DETECTAR TIPO =====
    let tabla = "";
    let columna = "";

    if (codigo.startsWith("GPR")) {
        tabla = "codigos_gpr";
        columna = "codigo";
    } else {
        tabla = "codigos_corp";
        columna = "codigo_completo";
    }

    try {
        const { data, error } = await supabase
            .from(tabla)
            .select("*")
            .eq(columna, codigo)
            .maybeSingle();

        // ===== VALIDACIÓN REAL =====
        if (error || !data || data.estatus === "disponible") {
            estado.innerHTML = "❌ Certificado NO válido";
            return;
        }

        // ===== CERTIFICADO VÁLIDO =====
        elNombre.textContent = nombre || "SIN NOMBRE";
        elCodigo.textContent = codigo;
        elFecha.textContent = fecha;

        estado.innerHTML = "✅ Certificado verificado en BlueSphere";

    } catch (err) {
        console.error(err);
        estado.innerHTML = "⚠️ Error de conexión";
    }

});
</script>

<style>
body {
    background:#020b12;
    color:#8feaff;
    font-family: Arial;
    text-align:center;
}

#certificado {
    margin:40px auto;
    padding:40px;
    width:600px;
    border:2px solid #00c4ff;
    border-radius:15px;
    background: rgba(0,20,40,0.85);
}

h1 { color:#00ffaa; }

#estado {
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="certificado">
    <h1>Certificado Oficial</h1>

    <p>Otorgado a:</p>
    <h2 id="nombre"></h2>

    <p>Código:</p>
    <h3 id="codigo"></h3>

    <p>Fecha de emisión:</p>
    <h3 id="fecha"></h3>

    <div id="estado">Validando...</div>
</div>

<button onclick="descargarPDF()">Descargar PDF</button>

<script>
async function descargarPDF() {
    const { jsPDF } = window.jspdf;

    const elemento = document.getElementById("certificado");
    const canvas = await html2canvas(elemento);
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);

    const nombreArchivo = document.getElementById("nombre").textContent || "Certificado";
    pdf.save(`Certificado-${nombreArchivo}.pdf`);
}
</script>

</body>
</html>

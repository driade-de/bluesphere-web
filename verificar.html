<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado BlueSphere</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl = "https://ophicpcbgdgzthjamzoz.supabase.co";
const supabaseAnonKey = "TU_ANON_KEY_AQUI";

const supabase = createClient(supabaseUrl, supabaseAnonKey);

// ===== LEER PARAMETROS =====
const params = new URLSearchParams(window.location.search);
const nombre = params.get("nombre");
const codigo = params.get("codigo");

// ===== ELEMENTOS =====
const elNombre = document.getElementById("nombre");
const elCodigo = document.getElementById("codigo");
const elFecha = document.getElementById("fecha");
const estado = document.getElementById("estado");

// ===== FECHA =====
const fecha = new Date().toLocaleDateString("es-MX", {
    day: "2-digit",
    month: "long",
    year: "numeric"
});

// ===== DETECTAR TIPO =====
let tabla = "";
let columna = "";

if (codigo && codigo.startsWith("GPR")) {
    tabla = "codigos_gpr";
    columna = "codigo";
} else {
    tabla = "codigos_corp";
    columna = "codigo_completo";
}

// ===== VALIDAR CONTRA SUPABASE =====
async function validar() {
    if (!codigo) {
        estado.innerHTML = "❌ Código no proporcionado";
        return;
    }

    const { data, error } = await supabase
        .from(tabla)
        .select("*")
        .eq(columna, codigo)
        .single();

    if (error || !data) {
        estado.innerHTML = "❌ Certificado NO válido";
        return;
    }

    // ✅ CERTIFICADO VÁLIDO
    elNombre.textContent = nombre || "SIN NOMBRE";
    elCodigo.textContent = codigo;
    elFecha.textContent = fecha;

    estado.innerHTML = "✅ Certificado verificado en BlueSphere";
}

// Ejecutar validación
validar();

</script>

<style>
body {
    background:#020b12;
    color:#8feaff;
    font-family: Arial;
    text-align:center;
}

#certificado {
    margin:40px auto;
    padding:40px;
    width:600px;
    border:2px solid #00c4ff;
    border-radius:15px;
    background: rgba(0,20,40,0.85);
}

h1 { color:#00ffaa; }

#estado {
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="certificado">
    <h1>Certificado Oficial</h1>

    <p>Otorgado a:</p>
    <h2 id="nombre"></h2>

    <p>Código:</p>
    <h3 id="codigo"></h3>

    <p>Fecha de emisión:</p>
    <h3 id="fecha"></h3>

    <div id="estado">Validando...</div>
</div>

<button onclick="descargarPDF()">Descargar PDF</button>

<script>
async function descargarPDF() {
    const { jsPDF } = window.jspdf;

    const elemento = document.getElementById("certificado");
    const canvas = await html2canvas(elemento);
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);

    pdf.save(`Certificado-${document.getElementById("nombre").textContent}.pdf`);
}
</script>

</body>
</html>
